<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>multi-user template</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <div class="who" id="who">multi-user template</div>
    <div class="meta-group">
      <span class="meta" id="meta">connecting…</span>
      <!-- Always-visible reload affordance. If the WS hangs (LAN
           firewall, dead relay, stale tab, etc.) the user can tap this
           instead of fishing through the browser menu. -->
      <button class="reload" title="Reload" onclick="location.reload()">↻</button>
    </div>
  </header>
  <main id="main"><!-- screens injected here --></main>
  <script src="/app.js"></script>
</body>
</html>
